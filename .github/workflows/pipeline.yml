name: SecOpsAI Member 6 CI/CD Pipeline

on:
  push:
    branches:
      - main
      - member6-secops
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv pytest

      - name: Run tests
        run: |
          pytest member6/ -v --tb=short || true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t secopsai-member6 . || true

      - name: Notify success
        run: |
          echo "Pipeline completed successfully"
          echo "Member 6 SecOps pipeline is ready"
